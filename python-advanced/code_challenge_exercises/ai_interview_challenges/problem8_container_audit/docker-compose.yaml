version: "3.9"

services:

  web:
    image: nginx:latest
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
    depends_on:
      - db
      - cache
    restart: always

  worker:
    image: mycorp/worker
    environment:
      APP_ENV: production
      LOG_LEVEL: debug
    depends_on:
      - db
      - queue   # undefined dependency (intentional)
    # missing restart policy

  db:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    # missing restart policy

  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  scheduler:
    image: mycorp/scheduler:1.0
    environment:
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_started
    restart: on-failure